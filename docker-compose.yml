version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/faiss_index:/app/faiss_index
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "5173:80" # Map dev port for convenience as well
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: always
